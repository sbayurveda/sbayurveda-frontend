name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm run build

      - name: Deploy over SSH (rsync)
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_PASSWORD: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          sshpass -p "$SSH_PASSWORD" rsync -avz --delete \
            --exclude 'old' --exclude 'new' \
            -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=no" \
            dist/ "$SSH_USER@$SSH_HOST:domains/sbayurveda.com/public_html/"
